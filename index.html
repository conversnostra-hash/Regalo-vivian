    <title>Para Vivian</title>

        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; color: white; 
            touch-action: manipulation; 
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #letras-cancion {
            position: absolute; top: 12%; width: 100%; text-align: center; z-index: 60;
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 1.3rem; line-height: 1.4;
            color: #fff; text-shadow: 0 0 15px #ff2d55;
            opacity: 0; transition: opacity 0.8s ease-in-out;
            pointer-events: none; padding: 0 25px; box-sizing: border-box;
            text-transform: uppercase; letter-spacing: 1px;
        }

        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(0, 0, 0, 0.9); border: 2px solid #ff2d55;
            color: #ff2d55; padding: 18px 36px; border-radius: 50px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 16px; letter-spacing: 4px;
            box-shadow: 0 0 25px #ff2d55; text-transform: uppercase;
        }

        #mensaje-fijo {
            position: absolute; bottom: 6%; width: 100%; text-align: center; z-index: 10;
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.8rem; font-weight: 400; letter-spacing: 1.5px;
            text-transform: uppercase; color: #ffb3c1;
        }

        #contenedor-foto {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 50; 
        }

        #foto-vivian {
            max-height: 55%; max-width: 85%; border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.9); 
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0); opacity: 0; border: 3px solid #ff2d55;
            object-fit: cover;
        }
    </style>
</head>
