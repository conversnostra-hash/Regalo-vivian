<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vivian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; touch-action: manipulation; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #letras-cancion {
            position: absolute; top: 12%; width: 100%; text-align: center; z-index: 60;
            font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1.3rem;
            color: #fff; text-shadow: 0 0 15px #ff2d55; opacity: 0; transition: opacity 0.8s;
            pointer-events: none; padding: 0 25px; box-sizing: border-box; text-transform: uppercase;
        }
        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(0,0,0,0.9); border: 2px solid #ff2d55; color: #ff2d55;
            padding: 18px 36px; border-radius: 50px; cursor: pointer; font-family: 'Montserrat', sans-serif;
            box-shadow: 0 0 25px #ff2d55; letter-spacing: 2px; text-transform: uppercase;
        }
        #contenedor-foto { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 50; }
        #foto-vivian { max-height: 55%; max-width: 85%; border-radius: 15px; box-shadow: 0 0 50px #ff2d55; transition: all 0.7s; transform: scale(0); opacity: 0; border: 3px solid #ff2d55; object-fit: cover; }
    </style>
</head>
<body>
    <button id="btn-play">PARA TI, VIVIAN 🎵</button>
    <div id="letras-cancion"></div>
    <div id="contenedor-foto"><img id="foto-vivian" src="" alt="Vivian"></div>
    <canvas id="heartCanvas"></canvas>
    <audio id="musica" loop><source src="bruno.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('musica');
    const btn = document.getElementById('btn-play');
    const foto = document.getElementById('foto-vivian');
    const displayLetras = document.getElementById('letras-cancion');

    let width, height, active = false;
    let heartParticles = [], textParticles = [];
    let rotationX = 0, rotationY = 0, targetRotationX = 0, targetRotationY = 0;
    let lastX, lastY, isDragging = false;

    const fotos = ['Vi1.jpg','Vi2.jpg','Vi3.jpg','Vi4.jpg','Vi5.jpg','Vi6.jpg','Vi7.jpg','Vi8.jpg','Vi9.jpg','Vi10.jpg','Vi11.jpg','Vi12.jpg','Vi13.jpg','Vi14.jpg','Vi15.jpg','Vi16.jpg','Vi17.jpg','Vi18.jpg','Vi19.jpg'];
    let mazo = [];
    let fotoVisible = false;

    function rellenarMazo() { mazo = [...fotos].sort(() => Math.random() - 0.5); }
    function mostrarFoto() {
        if (fotoVisible) return;
        if (mazo.length === 0) rellenarMazo();
        foto.src = mazo.pop();
        fotoVisible = true;
        foto.style.transform = "scale(1)"; foto.style.opacity = "1";
        setTimeout(() => {
            foto.style.transform = "scale(0)"; foto.style.opacity = "0";
            setTimeout(() => fotoVisible = false, 700);
        }, 8000);
    }

    function createTextPoints(text, yPos) {
        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = width; tCanvas.height = height;
        tCtx.fillStyle = "white";
        tCtx.font = `bold ${Math.min(width/10, 38)}px Montserrat`;
        tCtx.textAlign = 'center';
        tCtx.fillText(text, width/2, yPos);
        const data = tCtx.getImageData(0,0,width,height).data;
        const pts = [];
        for(let y=0; y<height; y+=3) for(let x=0; x<width; x+=3) if(data[(y*width+x)*4+3]>128) pts.push({x,y});
        return pts;
    }

    async function sequenceBirthdayText() {
        const lines = [
            {txt: "¡FELIZ", y: height * 0.78},
            {txt: "CUMPLEAÑOS,", y: height * 0.85},
            {txt: "VIVIAN!", y: height * 0.92}
        ];
        let pIdx = 0;
        for (let line of lines) {
            const pts = createTextPoints(line.txt, line.y);
            for (let i = 0; i < pts.length && pIdx < textParticles.length; i++) {
                textParticles[pIdx].tx = pts[i].x; textParticles[pIdx].ty = pts[i].y;
                textParticles[pIdx].visible = true; pIdx++;
            }
            await new Promise(r => setTimeout(r, 500));
        }
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        heartParticles = []; textParticles = [];
        for(let i=0; i<3000; i++) textParticles.push({x: width/2, y: height, tx: width/2, ty: height, vx:0, vy:0, visible: false});
        for (let i = 0; i < 4200; i++) heartParticles.push({ t: Math.random()*Math.PI*2, r: Math.sqrt(Math.random()), z: (Math.random()-0.5)*25, x: width/2, y: height/2 });
        rellenarMazo();
    }

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
        ctx.fillRect(0, 0, width, height);
        if (active) {
            textParticles.forEach(p => {
                if(p.visible) {
                    p.x += (p.tx - p.x) * 0.06; p.y += (p.ty - p.y) * 0.06;
                    ctx.fillStyle = '#fff'; ctx.fillRect(p.x, p.y, 1.5, 1.5);
                }
            });
            rotationY += (targetRotationY - rotationY) * 0.05;
            rotationX += (targetRotationX - rotationX) * 0.05;
            if(!isDragging) { targetRotationY *= 0.95; targetRotationX *= 0.95; }
            heartParticles.forEach(p => {
                const pulse = 1 + Math.sin(Date.now()*0.0035)*0.12;
                let x = 16 * Math.pow(Math.sin(p.t),3)*p.r, y = -(13*Math.cos(p.t)-5*Math.cos(2*p.t)-2*Math.cos(3*p.t)-Math.cos(4*p.t))*p.r;
                let x1 = x*Math.cos(rotationY)-p.z*p.r*Math.sin(rotationY), z1 = x*Math.sin(rotationY)+p.z*p.r*Math.cos(rotationY), y2 = y*Math.cos(rotationX)-z1*Math.sin(rotationX);
                const scale = Math.min(width, height)/45;
                let tx = x1*scale*pulse + width/2, ty = y2*scale*pulse + height/2 - 50;
                p.x += (tx - p.x)*0.08; p.y += (ty - p.y)*0.08;
                ctx.fillStyle = '#ff2d55'; ctx.fillRect(p.x, p.y, 1.6, 1.6);
            });
        }
        requestAnimationFrame(draw);
    }

    // --- FRASES MEJORADAS Y SINCRONIZADAS ---
    const letras = [
        {t: 16500, txt: "Oh, tus ojos, tus ojos..."},
        {t: 20000, txt: "Hacen que las estrellas parezcan no brillar"},
        {t: 24500, txt: "Tu cabello, tu cabello..."},
        {t: 28000, txt: "Cae perfectamente sin intentarlo"},
        {t: 32500, txt: "Vivian, eres tan hermosa"},
        {t: 36000, txt: "Y te lo digo todos los días"},
        {t: 40500, txt: "Sé que cuando te doy un cumplido..."},
        {t: 44000, txt: "Parece que no me crees"},
        {t: 48500, txt: "Y es tan triste pensar..."},
        {t: 52000, txt: "Que no ves lo que yo veo en ti"},
        {t: 56500, txt: "Pero cada vez que me preguntas..."},
        {t: 60000, txt: "¿Me veo bien?, ya sabes qué diré"},
        {t: 64500, txt: "Cuando veo tu rostro..."},
        {t: 68500, txt: "No hay nada que quisiera cambiar"},
        {t: 72500, txt: "Porque Vivian, eres increíble"},
        {t: 76500, txt: "Tal como eres"},
        {t: 80500, txt: "Y cuando sonríes..."},
        {t: 84500, txt: "El mundo entero se detiene a mirar"},
        {t: 88500, txt: "Porque eres simplemente asombrosa"},
        {t: 92500, txt: "Tal como eres, Vivian"}
    ];

    function iniciarSincronizacion() {
        let idx = 0;
        const interval = setInterval(() => {
            if(!active) return;
            let current = audio.currentTime * 1000;
            if(idx < letras.length && current >= letras[idx].t) {
                displayLetras.style.opacity = 0;
                setTimeout(() => {
                    displayLetras.innerText = letras[idx].txt;
                    displayLetras.style.opacity = 1;
                    idx++;
                }, 400);
            }
        }, 100);
    }

    btn.addEventListener('click', () => { active = true; btn.style.display = 'none'; audio.play(); sequenceBirthdayText(); iniciarSincronizacion(); });
    let tap = 0;
    window.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; if(Date.now()-tap < 300) mostrarFoto(); tap = Date.now(); });
    window.addEventListener('touchmove', e => { if(isDragging) { targetRotationY += (e.touches[0].clientX - lastX)*0.012; targetRotationX -= (e.touches[0].clientY - lastY)*0.012; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; } });
    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('resize', init);
    init(); draw();
</script>
</body>
</html>
