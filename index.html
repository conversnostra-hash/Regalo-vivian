<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vivian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; color: white; 
            touch-action: manipulation; 
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #letras-cancion {
            position: absolute; top: 12%; width: 100%; text-align: center; z-index: 60;
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 1.3rem; line-height: 1.4;
            color: #fff; text-shadow: 0 0 15px #ff2d55;
            opacity: 0; transition: opacity 0.8s ease-in-out;
            pointer-events: none; padding: 0 25px; box-sizing: border-box;
            text-transform: uppercase; letter-spacing: 1px;
        }

        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(0, 0, 0, 0.9); border: 2px solid #ff2d55;
            color: #ff2d55; padding: 18px 36px; border-radius: 50px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 16px; letter-spacing: 4px;
            box-shadow: 0 0 25px #ff2d55; text-transform: uppercase;
        }

        #mensaje-fijo {
            position: absolute; bottom: 6%; width: 100%; text-align: center; z-index: 10;
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.8rem; font-weight: 400; letter-spacing: 1.5px;
            text-transform: uppercase; color: #ffb3c1;
        }

        #contenedor-foto {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 50; 
        }

        #foto-vivian {
            max-height: 55%; max-width: 85%; border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.9); 
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0); opacity: 0; border: 3px solid #ff2d55;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <button id="btn-play">PARA VIVIAN 🎵</button>
    <div id="letras-cancion"></div>
    <div id="mensaje-fijo">Tu belleza ilumina todo.<br><b>(Doble toque para sorpresa)</b></div>
    <div id="contenedor-foto"><img id="foto-vivian" src="" alt="Vivian"></div>
    <canvas id="heartCanvas"></canvas>
    <audio id="musica" loop><source src="bruno.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('musica');
    const btn = document.getElementById('btn-play');
    const foto = document.getElementById('foto-vivian');
    const displayLetras = document.getElementById('letras-cancion');

    let width, height, particles = [];
    let rotationX = 0, rotationY = 0, targetRotationX = 0, targetRotationY = 0;
    let lastX = 0, lastY = 0, isDragging = false, active = false;

    // --- GALERÍA SIN REPETICIÓN ---
    const galeriaOriginal = ['Vi1.jpg', 'Vi2.jpg', 'Vi3.jpg', 'Vi4.jpg', 'Vi5.jpg', 'Vi6.jpg', 'Vi7.jpg', 'Vi8.jpg', 'Vi9.jpg', 'Vi10.jpg', 'Vi11.jpg', 'Vi12.jpg', 'Vi13.jpg', 'Vi14.jpg', 'Vi15.jpg', 'Vi16.jpg', 'Vi17.jpg', 'Vi18.jpg', 'Vi19.jpg'];
    let mazoFotos = [];
    let fotoVisible = false;

    function rellenarMazo() { 
        mazoFotos = [...galeriaOriginal].sort(() => Math.random() - 0.5); 
    }
    
    function mostrarNuevaFoto() {
        if (fotoVisible) return;
        if (mazoFotos.length === 0) rellenarMazo();
        foto.src = mazoFotos.pop();
        fotoVisible = true;
        foto.style.transform = "scale(1)"; foto.style.opacity = "1";
        setTimeout(() => {
            foto.style.transform = "scale(0)"; foto.style.opacity = "0";
            setTimeout(() => { fotoVisible = false; }, 700);
        }, 8000);
    }

    // --- LETRAS SINCRONIZADAS ---
    const letraSincronizada = [
        { tiempo: 16500, texto: "Oh, tus ojos, tus ojos..." },
        { tiempo: 20000, texto: "Hacen que las estrellas parezcan no brillar" },
        { tiempo: 24500, texto: "Tu cabello, tu cabello..." },
        { tiempo: 28000, texto: "Cae perfectamente sin intentarlo" },
        { tiempo: 32500, texto: "Vivian, eres tan hermosa" },
        { tiempo: 36000, texto: "Y te lo digo todos los días" },
        { tiempo: 40500, texto: "Sé que cuando te doy un cumplido..." },
        { tiempo: 44000, texto: "Parece que no me crees" },
        { tiempo: 48500, texto: "Y es tan triste pensar..." },
        { tiempo: 52000, texto: "Que no ves lo que yo veo en ti" },
        { tiempo: 56500, texto: "Pero cada vez que me preguntas..." },
        { tiempo: 60000, texto: "¿Me veo bien?, ya sabes qué diré" },
        { tiempo: 64500, texto: "Cuando veo tu rostro..." },
        { tiempo: 68500, texto: "No hay nada que quisiera cambiar" },
        { tiempo: 72500, texto: "Porque Vivian, eres increíble" },
        { tiempo: 76500, texto: "Tal como eres" },
        { tiempo: 80500, texto: "Y cuando sonríes..." },
        { tiempo: 84500, texto: "El mundo entero se detiene a mirar" },
        { tiempo: 88500, texto: "Porque eres simplemente asombrosa" },
        { tiempo: 92500, texto: "Tal como eres, Vivian" },
        { tiempo: 104000, texto: "Tus labios, tus labios..." },
        { tiempo: 108000, texto: "Podría besarlos todo el día" },
        { tiempo: 112000, texto: "Tu risa, tu risa..." },
        { tiempo: 116000, texto: "Dices que la odias, pero es perfecta" },
        { tiempo: 120500, texto: "Vivian, eres tan hermosa..." },
        { tiempo: 124000, texto: "Y te lo digo todos los días" },
        { tiempo: 128500, texto: "Oh, no te molestes en preguntar..." },
        { tiempo: 132000, texto: "Si te ves bien, ya sabes mi respuesta" },
        { tiempo: 136500, texto: "Cuando veo tu rostro..." },
        { tiempo: 140500, texto: "No hay una sola cosa que cambiaría" },
        { tiempo: 144500, texto: "Porque Vivian, eres increíble" },
        { tiempo: 148500, texto: "Tal como eres" },
        { tiempo: 152500, texto: "Y cuando sonríes..." },
        { tiempo: 156500, texto: "El mundo entero se detiene a mirar" },
        { tiempo: 160500, texto: "Porque eres simplemente asombrosa" },
        { tiempo: 164500, texto: "Tal como eres" }
    ];

    function iniciarSincronizacion() {
        let letraIndex = 0;
        setInterval(() => {
            if (!active) return;
            let currentTime = audio.currentTime * 1000;
            if (letraIndex < letraSincronizada.length && currentTime >= letraSincronizada[letraIndex].tiempo) {
                displayLetras.style.opacity = 0;
                setTimeout(() => {
                    displayLetras.innerText = letraSincronizada[letraIndex].texto;
                    displayLetras.style.opacity = 1;
                    letraIndex++;
                }, 400);
            }
        }, 100);
    }

    // --- CORAZÓN RELLENO Y 3D ---
    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 4500; i++) {
            particles.push({
                t: Math.random() * Math.PI * 2,
                r: Math.sqrt(Math.random()), // RELLENO DE CORAZÓN
                z: (Math.random() - 0.5) * 25,
                x: width / 2,
                y: height / 2,
                vx: 0, vy: 0
            });
        }
        rellenarMazo();
    }

    function getHeartPos(p) {
        const pulse = 1 + Math.sin(Date.now() * 0.0035) * 0.12;
        let x = 16 * Math.pow(Math.sin(p.t), 3) * p.r;
        let y = -(13 * Math.cos(p.t) - 5 * Math.cos(2*p.t) - 2 * Math.cos(3*p.t) - Math.cos(4*p.t)) * p.r;
        
        // Rotación 3D mejorada
        let x1 = x * Math.cos(rotationY) - p.z * p.r * Math.sin(rotationY);
        let z1 = x * Math.sin(rotationY) + p.z * p.r * Math.cos(rotationY);
        let y2 = y * Math.cos(rotationX) - z1 * Math.sin(rotationX);

        const scale = Math.min(width, height) / 45;
        return {
            x: x1 * scale * pulse + width / 2,
            y: y2 * scale * pulse + height / 2 - 40
        };
    }

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
        ctx.fillRect(0, 0, width, height);
        if (active) {
            rotationY += (targetRotationY - rotationY) * 0.05;
            rotationX += (targetRotationX - rotationX) * 0.05;
            if(!isDragging) { targetRotationY *= 0.95; targetRotationX *= 0.95; }

            particles.forEach(p => {
                const target = getHeartPos(p);
                p.x += (target.x - p.x) * 0.08;
                p.y += (target.y - p.y) * 0.08;
                ctx.fillStyle = '#ff2d55';
                ctx.fillRect(p.x, p.y, 1.5, 1.5);
            });
        }
        requestAnimationFrame(draw);
    }

    btn.addEventListener('click', () => {
        active = true;
        btn.style.display = 'none';
        audio.play().catch(e => console.log("Audio ready"));
        iniciarSincronizacion();
    });

    let lastTap = 0;
    window.addEventListener('touchstart', e => {
        isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        const now = Date.now();
        if (now - lastTap < 300) mostrarNuevaFoto();
        lastTap = now;
    });
    window.addEventListener('touchmove', e => {
        if (isDragging) {
            targetRotationY += (e.touches[0].clientX - lastX) * 0.012;
            targetRotationX -= (e.touches[0].clientY - lastY) * 0.012;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }
    });
    window.addEventListener('touchend', () => { isDragging = false; });
    window.addEventListener('resize', init);

    init();
    draw();
</script>
</body>
</html>
