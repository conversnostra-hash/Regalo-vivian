<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vivian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; color: white; 
            touch-action: manipulation; 
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #letras-cancion {
            position: absolute; top: 15%; width: 100%; text-align: center; z-index: 60;
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 1.25rem; line-height: 1.4;
            color: #fff; text-shadow: 0 0 15px #ff2d55;
            opacity: 0; transition: opacity 0.8s ease-in-out;
            pointer-events: none; padding: 0 25px; box-sizing: border-box;
            text-transform: uppercase; letter-spacing: 1px;
        }

        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(0, 0, 0, 0.9); border: 2px solid #ff2d55;
            color: #ff2d55; padding: 18px 36px; border-radius: 50px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 16px; letter-spacing: 4px;
            box-shadow: 0 0 25px #ff2d55; text-transform: uppercase;
        }

        #mensaje-fijo {
            position: absolute; bottom: 6%; width: 100%; text-align: center; z-index: 10;
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.8rem; font-weight: 400; letter-spacing: 1.5px;
            text-transform: uppercase; color: #ffb3c1; line-height: 1.6;
        }

        #contenedor-foto {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 50; 
        }

        #foto-vivian {
            max-height: 55%; max-width: 85%; border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.9); 
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0); opacity: 0; border: 3px solid #ff2d55;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <button id="btn-play">PARA TI, VIVIAN 🎵</button>
    <div id="letras-cancion"></div>
    <div id="mensaje-fijo">Tu belleza ilumina todo.<br><b>(Doble toque para sorpresa)</b></div>
    <div id="contenedor-foto"><img id="foto-vivian" src="" alt="Vivian"></div>
    <canvas id="heartCanvas"></canvas>
    <audio id="musica" loop><source src="bruno.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('musica');
    const btn = document.getElementById('btn-play');
    const foto = document.getElementById('foto-vivian');
    const displayLetras = document.getElementById('letras-cancion');

    let width, height, active = false;
    let heartParticles = [], textParticles = [];
    let rotationX = 0, rotationY = 0, targetRotationX = 0, targetRotationY = 0;
    let lastX = 0, lastY = 0, isDragging = false;

    // --- CONFIGURACIÓN DE GALERÍA ---
    const galeria = ['Vi1.jpg', 'Vi2.jpg', 'Vi3.jpg', 'Vi4.jpg', 'Vi5.jpg', 'Vi6.jpg', 'Vi7.jpg', 'Vi8.jpg', 'Vi9.jpg', 'Vi10.jpg', 'Vi11.jpg', 'Vi12.jpg', 'Vi13.jpg', 'Vi14.jpg', 'Vi15.jpg', 'Vi16.jpg', 'Vi17.jpg', 'Vi18.jpg', 'Vi19.jpg'];
    let mazo = [];
    let fotoVisible = false;

    function rellenarMazo() { mazo = [...galeria].sort(() => Math.random() - 0.5); }
    
    function mostrarNuevaFoto() {
        if (fotoVisible) return;
        if (mazo.length === 0) rellenarMazo();
        foto.src = mazo.pop();
        fotoVisible = true;
        foto.style.transform = "scale(1)"; foto.style.opacity = "1";
        setTimeout(() => {
            foto.style.transform = "scale(0)"; foto.style.opacity = "0";
            setTimeout(() => { fotoVisible = false; }, 700);
        }, 8000);
    }

    // --- SISTEMA DE PARTÍCULAS TEXTO (HORIZONTAL) ---
    function createTextPoints(text) {
        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = window.innerWidth;
        tCanvas.height = window.innerHeight;
        tCtx.fillStyle = "white";
        const fontSize = Math.min(window.innerWidth / 11, 32);
        tCtx.font = `bold ${fontSize}px Montserrat`;
        tCtx.textAlign = 'center';
        tCtx.fillText(text, window.innerWidth / 2, window.innerHeight * 0.88);
        
        const data = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height).data;
        const pts = [];
        for (let y = 0; y < tCanvas.height; y += 3) {
            for (let x = 0; x < tCanvas.width; x += 3) {
                if (data[(y * tCanvas.width + x) * 4 + 3] > 128) pts.push({ x, y });
            }
        }
        return pts;
    }

    async function sequenceBirthdayText() {
        const pts = createTextPoints("¡FELIZ CUMPLEAÑOS, VIVIAN!");
        for (let i = 0; i < pts.length && i < textParticles.length; i++) {
            textParticles[i].tx = pts[i].x;
            textParticles[i].ty = pts[i].y;
            textParticles[i].visible = true;
        }
    }

    // --- LÍRICA EN ESPAÑOL SECUENCIAL ---
    const letraSincronizada = [
        { inicio: 16.5, fin: 19.5, texto: "Oh, tus ojos, tus ojos..." },
        { inicio: 19.8, fin: 24.0, texto: "Hacen que las estrellas no parezcan brillar" },
        { inicio: 24.5, fin: 27.5, texto: "Tu cabello, tu cabello..." },
        { inicio: 27.8, fin: 32.0, texto: "Cae perfecto sin siquiera intentarlo" },
        { inicio: 32.5, fin: 35.5, texto: "Vivian, eres tan hermosa..." },
        { inicio: 35.8, fin: 40.0, texto: "Y te lo digo cada día" },
        { inicio: 40.5, fin: 43.5, texto: "Sé que cuando te doy un cumplido..." },
        { inicio: 43.8, fin: 48.0, texto: "Parece que no me crees" },
        { inicio: 48.5, fin: 51.5, texto: "Y es tan triste pensar..." },
        { inicio: 51.8, fin: 56.0, texto: "Que no ves lo que yo veo en ti" },
        { inicio: 56.5, fin: 59.5, texto: "Pero cada vez que me preguntas..." },
        { inicio: 59.8, fin: 64.0, texto: "¿Me veo bien?, ya sabes qué diré" },
        { inicio: 64.5, fin: 68.0, texto: "Cuando veo tu rostro..." },
        { inicio: 68.2, fin: 72.0, texto: "No hay nada que quisiera cambiar" },
        { inicio: 72.5, fin: 76.0, texto: "Porque Vivian, eres increíble" },
        { inicio: 76.2, fin: 80.0, texto: "Tal como eres" },
        { inicio: 80.5, fin: 84.0, texto: "Y cuando sonríes..." },
        { inicio: 84.2, fin: 88.0, texto: "El mundo entero se detiene a mirar" },
        { inicio: 88.5, fin: 92.0, texto: "Porque eres simplemente asombrosa" },
        { inicio: 92.2, fin: 96.0, texto: "Tal como eres, Vivian" }
    ];

    function actualizarLetras() {
        if (!active) return;
        const time = audio.currentTime;
        let fraseActual = letraSincronizada.find(f => time >= f.inicio && time <= f.fin);

        if (fraseActual) {
            if (displayLetras.innerText !== fraseActual.texto) {
                displayLetras.innerText = fraseActual.texto;
                displayLetras.style.opacity = 1;
            }
        } else {
            displayLetras.style.opacity = 0;
        }
        requestAnimationFrame(actualizarLetras);
    }

    // --- NÚCLEO DEL CORAZÓN Y ANIMACIÓN ---
    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        heartParticles = []; textParticles = [];
        
        for(let i=0; i<3800; i++) {
            textParticles.push({x: width/2, y: height, tx: width/2, ty: height, vx:0, vy:0, visible: false});
        }
        for (let i = 0; i < 4500; i++) {
            heartParticles.push({
                t: Math.random() * Math.PI * 2,
                r: Math.sqrt(Math.random()), 
                z: (Math.random() - 0.5) * 25,
                x: width / 2, y: height / 2
            });
        }
        rellenarMazo();
    }

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, width, height);
        
        if (active) {
            textParticles.forEach(p => {
                if(p.visible) {
                    p.x += (p.tx - p.x) * 0.05; p.y += (p.ty - p.y) * 0.05;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(p.x, p.y, 1.3, 1.3);
                }
            });

            rotationY += (targetRotationY - rotationY) * 0.05;
            rotationX += (targetRotationX - rotationX) * 0.05;
            if(!isDragging) { targetRotationY *= 0.95; targetRotationX *= 0.95; }
            
            heartParticles.forEach(p => {
                const pulse = 1 + Math.sin(Date.now() * 0.0035) * 0.12;
                let x = 16 * Math.pow(Math.sin(p.t), 3) * p.r;
                let y = -(13 * Math.cos(p.t) - 5 * Math.cos(2*p.t) - 2 * Math.cos(3*p.t) - Math.cos(4*p.t)) * p.r;
                
                let x1 = x * Math.cos(rotationY) - p.z * p.r * Math.sin(rotationY);
                let z1 = x * Math.sin(rotationY) + p.z * p.r * Math.cos(rotationY);
                let y2 = y * Math.cos(rotationX) - z1 * Math.sin(rotationX);
                
                const scale = Math.min(width, height) / 45;
                let tx = x1 * scale * pulse + width / 2;
                let ty = y2 * scale * pulse + height / 2 - 50;
                
                p.x += (tx - p.x) * 0.08;
                p.y += (ty - p.y) * 0.08;
                
                ctx.fillStyle = '#ff2d55';
                ctx.fillRect(p.x, p.y, 1.6, 1.6);
            });
        }
        requestAnimationFrame(draw);
    }

    btn.addEventListener('click', () => {
        active = true;
        btn.style.display = 'none';
        audio.play();
        sequenceBirthdayText();
        actualizarLetras(); // Inicia el bucle de sincronización
    });

    let lastTap = 0;
    window.addEventListener('touchstart', e => {
        isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        const now = Date.now();
        if (now - lastTap < 300) mostrarNuevaFoto();
        lastTap = now;
    });

    window.addEventListener('touchmove', e => {
        if (isDragging) {
            targetRotationY += (e.touches[0].clientX - lastX) * 0.012;
            targetRotationX -= (e.touches[0].clientY - lastY) * 0.012;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }
    });

    window.addEventListener('touchend', () => { isDragging = false; });
    window.addEventListener('resize', init);
    
    init(); draw();
</script>
</body>
</html>
