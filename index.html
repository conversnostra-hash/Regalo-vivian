<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vivian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; color: white; 
            touch-action: manipulation; 
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #letras-cancion {
            position: absolute; top: 10%; width: 100%; text-align: center; z-index: 60;
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 1.4rem; line-height: 1.3;
            color: #fff; text-shadow: 0 0 15px #ff2d55;
            opacity: 0; transition: opacity 1.2s ease-in-out;
            pointer-events: none; padding: 0 20px; box-sizing: border-box;
            text-transform: uppercase; letter-spacing: 1px;
        }

        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(0, 0, 0, 0.9); border: 2px solid #ff2d55;
            color: #ff2d55; padding: 18px 36px; border-radius: 50px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 16px; letter-spacing: 4px;
            box-shadow: 0 0 25px #ff2d55;
        }

        #mensaje-fijo {
            position: absolute; bottom: 6%; width: 100%; text-align: center; z-index: 10;
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.8rem; font-weight: 400; letter-spacing: 1.5px;
            text-transform: uppercase; color: #ffb3c1;
        }

        #contenedor-foto {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 50; 
        }

        #foto-vivian {
            max-height: 55%; max-width: 85%; border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.9); 
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0); opacity: 0; border: 3px solid #ff2d55;
        }
    </style>
</head>
<body>
    <button id="btn-play">PARA VIVIAN 🎵</button>
    <div id="letras-cancion"></div>
    <div id="mensaje-fijo">Tu belleza ilumina todo.<br><b>(Doble toque para sorpresa)</b></div>
    <div id="contenedor-foto"><img id="foto-vivian" src="" alt="Vivian"></div>
    <canvas id="heartCanvas"></canvas>
    <audio id="musica" loop><source src="bruno.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('musica');
    const btn = document.getElementById('btn-play');
    const foto = document.getElementById('foto-vivian');
    const displayLetras = document.getElementById('letras-cancion');

    // --- LETRA COMPLETA Y PERSONALIZADA ---
    const frasesCancion = [
        "Oh, tus ojos, tus ojos...",
        "Hacen que las estrellas parezcan no brillar",
        "Tu cabello, tu cabello...",
        "Cae perfectamente sin intentarlo",
        "Vivian, eres tan hermosa",
        "Y te lo digo todos los días",
        "Sé que cuando te doy un cumplido...",
        "A veces no me crees",
        "Y es tan triste pensar...",
        "Que no ves lo que yo veo",
        "Pero cada vez que me preguntas...",
        "¿Me veo bien?",
        "Yo te digo...",
        "Cuando veo tu rostro...",
        "No hay nada que quisiera cambiar",
        "Porque Vivian, eres increíble",
        "Tal como eres",
        "Y cuando sonríes...",
        "El mundo entero se detiene",
        "Se queda mirando por un momento",
        "Porque eres asombrosa",
        "Tal como eres, Vivian",
        "Tus labios, tus labios...",
        "Podría besarlos todo el día",
        "Tu risa, tu risa...",
        "Dices que la odias, pero es perfecta",
        "Eres tan hermosa...",
        "Y te lo digo todos los días",
        "No te molestes en preguntar...",
        "Si te ves bien, ya sabes qué diré",
        "Cuando veo tu rostro...",
        "No hay una sola cosa que cambiaría",
        "Porque Vivian, eres increíble",
        "Exactamente tal como eres",
        "Y cuando sonríes...",
        "El mundo entero se detiene a mirar",
        "Porque eres simplemente increíble",
        "La forma en que eres...",
        "La forma en que eres...",
        "Vivian, eres increíble",
        "Tal como eres",
        "Cuando veo tu rostro...",
        "No hay nada que quisiera cambiar",
        "Porque eres asombrosa",
        "Tal como eres",
        "Y cuando sonríes...",
        "El mundo entero se detiene a mirar",
        "Porque eres increíble",
        "Tal como eres, Vivian"
    ];

    let fraseActual = 0;
    let active = false;

    function mostrarSiguienteFrase() {
        if (!active) return;
        displayLetras.style.opacity = 0;
        setTimeout(() => {
            displayLetras.innerText = frasesCancion[fraseActual];
            displayLetras.style.opacity = 1;
            fraseActual = (fraseActual + 1) % frasesCancion.length;
        }, 1200);
    }

    const galeriaFotos = ['Vi1.jpg', 'Vi2.jpg', 'Vi3.jpg', 'Vi4.jpg', 'Vi5.jpg', 'Vi6.jpg', 'Vi7.jpg', 'Vi8.jpg', 'Vi9.jpg', 'Vi10.jpg', 'Vi11.jpg', 'Vi12.jpg', 'Vi13.jpg', 'Vi14.jpg', 'Vi15.jpg', 'Vi16.jpg', 'Vi17.jpg', 'Vi18.jpg', 'Vi19.jpg'];
    let mazoFotos = [];
    let width, height, particles = [];
    let rotationX = 0, rotationY = 0, targetRotationX = 0, targetRotationY = 0;
    let lastX = 0, lastY = 0, isDragging = false;

    function barajarFotos() { mazoFotos = [...galeriaFotos].sort(() => Math.random() - 0.5); }
    function cambiarFoto() {
        if (mazoFotos.length === 0) barajarFotos();
        foto.src = mazoFotos.pop();
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 4800; i++) {
            const t = Math.random() * Math.PI * 2;
            particles.push({
                t, r: Math.pow(Math.random(), 0.5), z: (Math.random()-0.5)*30,
                x: width/2, y: height/2, vx: 0, vy: 0, tx: 0, ty: 0, isText: false, locked: false
            });
        }
        barajarFotos(); cambiarFoto();
    }

    function getHeartPos(p) {
        const pulse = 1 + Math.sin(Date.now() * 0.0035) * 0.12;
        let x = 16 * Math.pow(Math.sin(p.t), 3) * p.r * pulse;
        let y = -(13 * Math.cos(p.t) - 5 * Math.cos(2*p.t) - 2 * Math.cos(3*p.t) - Math.cos(4*p.t)) * p.r * pulse;
        let z = p.z * pulse;
        let x1 = x * Math.cos(rotationY) - z * Math.sin(rotationY);
        let z1 = x * Math.sin(rotationY) + z * Math.cos(rotationY);
        let y2 = y * Math.cos(rotationX) - z1 * Math.sin(rotationX);
        const scale = Math.min(width, height) / 50;
        return { x: x1 * scale + width / 2, y: y2 * scale + height / 2 - 100 };
    }

    function createTextPoints(text, xCenter) {
        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = width; tCanvas.height = height;
        tCtx.fillStyle = "white";
        tCtx.font = `bold ${Math.min(width/10, 40)}px 'Dancing Script'`; 
        tCtx.textAlign = 'center';
        tCtx.fillText(text, xCenter, height * 0.84);
        const data = tCtx.getImageData(0,0,width,height).data;
        const pts = [];
        for(let y=0; y<height; y+=2) for(let x=0; x<width; x+=2) if(data[(y*width+x)*4+3]>160) pts.push({x,y});
        return pts;
    }

    async function startSequence() {
        const words = [{ txt: "¡Feliz", x: width * 0.22 }, { txt: "Cumpleaños,", x: width * 0.5 }, { txt: "Vivian!", x: width * 0.78 }];
        let pIdx = 0;
        for (let word of words) {
            const pts = createTextPoints(word.txt, word.x);
            for (let i = 0; i < pts.length && pIdx < particles.length; i++) {
                let p = particles[pIdx++];
                p.isText = true; p.tx = pts[i].x; p.ty = pts[i].y;
            }
            await new Promise(r => setTimeout(r, 900));
        }
    }

    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0,0,width,height);
        if (active) {
            if (!isDragging) { targetRotationX *= 0.90; targetRotationY *= 0.90; }
            rotationX += (targetRotationX - rotationX) * 0.06;
            rotationY += (targetRotationY - rotationY) * 0.06;
            particles.forEach(p => {
                if (p.isText) {
                    if (!p.locked) {
                        const dist = Math.hypot(p.tx - p.x, p.ty - p.y);
                        if (dist < 1) { p.x = p.tx; p.y = p.ty; p.locked = true; }
                        else { p.vx += (p.tx - p.x) * 0.04; p.vy += (p.ty - p.y) * 0.04; p.vx *= 0.8; p.vy *= 0.8; p.x += p.vx; p.y += p.vy; }
                    }
                } else {
                    const target = getHeartPos(p);
                    p.vx += (target.x - p.x) * 0.06; p.vy += (target.y - p.y) * 0.06;
                    p.vx *= 0.82; p.vy *= 0.82; p.x += p.vx; p.y += p.vy;
                }
                ctx.fillStyle = '#ff2d55'; ctx.fillRect(p.x, p.y, 2, 2);
            });
        }
        requestAnimationFrame(draw);
    }

    btn.addEventListener('click', () => {
        audio.play(); btn.style.display = 'none';
        active = true;
        startSequence();
        
        // Espera los 16s de intro instrumental
        setTimeout(() => {
            mostrarSiguienteFrase();
            setInterval(mostrarSiguienteFrase, 5200); 
        }, 16000); 
    });

    let lastTap = 0;
    window.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
            e.preventDefault();
            foto.style.transform = "scale(1)"; foto.style.opacity = "1";
            setTimeout(() => { 
                foto.style.transform = "scale(0)"; foto.style.opacity = "0";
                setTimeout(cambiarFoto, 800); 
            }, 8000);
        }
        lastTap = now; isDragging = false;
    });

    window.addEventListener('touchstart', e => {
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; isDragging = true;
    });

    window.addEventListener('touchmove', e => {
        if(isDragging) {
            targetRotationY += (e.touches[0].clientX - lastX) * 0.02;
            targetRotationX -= (e.touches[0].clientY - lastY) * 0.02;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }
    });

    window.addEventListener('resize', init);
    init(); draw();
</script>
</body>
</html>
