<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vivian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: #ff2d55; color: white; border: none;
            padding: 20px 40px; border-radius: 50px; font-family: 'Montserrat';
            font-size: 14px; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 20px #ff2d55;
        }
        #mensaje-fijo {
            position: absolute; bottom: 5%; width: 100%; text-align: center; z-index: 10;
            color: rgba(255, 255, 255, 0.7); font-family: 'Montserrat'; font-size: 10px;
            letter-spacing: 1px; text-transform: uppercase; pointer-events: none;
        }
        #foto-vivian {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 50; max-height: 50%; border-radius: 15px; opacity: 0;
            transition: all 0.6s ease; box-shadow: 0 0 30px #ff2d55;
        }
    </style>
</head>
<body>

    <button id="btn-play">EMPEZAR SORPRESA 🎵</button>
    <div id="mensaje-fijo">Tu belleza ilumina más que cualquier estrella.</div>
    <img id="foto-vivian" src="Foto.jpg">
    <canvas id="heartCanvas"></canvas>
    <audio id="musica" preload="auto"><source src="bruno.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('musica');
    const btn = document.getElementById('btn-play');
    const foto = document.getElementById('foto-vivian');

    let width, height, particles = [], activo = false;
    const particleCount = 3500;

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push({
                t: Math.random() * Math.PI * 2,
                r: Math.pow(Math.random(), 0.5),
                x: width / 2, y: height / 2,
                vx: 0, vy: 0
            });
        }
    }

    function getHeartPoint(t, r) {
        const pulse = 1 + Math.sin(Date.now() * 0.003) * 0.07;
        const x = 16 * Math.pow(Math.sin(t), 3) * r * pulse;
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r * pulse;
        return { x: x * 13 + width / 2, y: y * 13 + height / 2 - 50 };
    }

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, width, height);

        particles.forEach(p => {
            const target = getHeartPoint(p.t, p.r);
            p.vx += (target.x - p.x) * 0.05;
            p.vy += (target.y - p.y) * 0.05;
            p.vx *= 0.8; p.vy *= 0.8;
            p.x += p.vx; p.y += p.vy;

            ctx.fillStyle = '#ff2d55';
            ctx.fillRect(p.x, p.y, 1.5, 1.5);
        });
        requestAnimationFrame(draw);
    }

    btn.addEventListener('click', () => {
        activo = true;
        btn.style.display = 'none';
        // Intenta tocar música pero arranca la animación sí o sí
        audio.play().catch(() => console.log("Música bloqueada o no encontrada"));
        init();
        draw();
    });

    // Doble toque para la foto
    let lastTap = 0;
    window.addEventListener('touchend', () => {
        const now = Date.now();
        if (now - lastTap < 300) {
            foto.style.transform = "translate(-50%, -50%) scale(1)";
            foto.style.opacity = "1";
            setTimeout(() => {
                foto.style.transform = "translate(-50%, -50%) scale(0)";
                foto.style.opacity = "0";
            }, 4000);
        }
        lastTap = now;
    });

    window.addEventListener('resize', init);
    init(); // Carga inicial del canvas
</script>
</body>
</html>
