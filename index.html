
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vivian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(0, 0, 0, 0.9); border: 2px solid #ff2d55;
            color: #ff2d55; padding: 15px 30px; border-radius: 50px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 14px; letter-spacing: 4px;
            box-shadow: 0 0 20px #ff2d55;
        }

        #mensaje-fijo {
            position: absolute; bottom: 8%; width: 100%; text-align: center; z-index: 10;
            font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; color: #ffb3c1; opacity: 0.8;
        }

        #foto-vivian {
            position: absolute; 
            top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 50; max-height: 60%; max-width: 80%; border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 45, 85, 0.8); transition: all 0.6s ease;
            opacity: 0; pointer-events: none; border: 3px solid #ff2d55;
        }
    </style>
</head>
<body>
    <button id="btn-play">PARA VIVIAN 🎵</button>
    <div id="mensaje-fijo">Tu belleza ilumina más que cualquier estrella.<br>(Doble toque en el centro inferior para sorpresa)</div>
    <img id="foto-vivian" src="Foto.jpg" alt="Vivian">
    <canvas id="heartCanvas"></canvas>
    <audio id="musica" loop><source src="bruno.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('musica');
    const btn = document.getElementById('btn-play');
    const foto = document.getElementById('foto-vivian');

    // SEPARACIÓN DE SISTEMAS DE PARTÍCULAS
    let width, height, heartParticles = [], textParticles = [];
    let rotationX = 0, rotationY = 0, targetRotationX = 0, targetRotationY = 0;
    let lastX = 0, lastY = 0, isDragging = false, active = false;

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        
        // SISTEMA 1: CORAZÓN (Siempre vuelve a su sitio)
        heartParticles = [];
        for (let i = 0; i < 2000; i++) {
            const t = Math.random() * Math.PI * 2;
            heartParticles.push({
                t, r: Math.pow(Math.random(), 0.5), z: (Math.random()-0.5)*20,
                x: width/2, y: height/2, vx: 0, vy: 0
            });
        }
        
        // SISTEMA 2: TEXTO (Nace vacío y se llena secuencialmente)
        textParticles = [];
    }

    function getHeartPos(p, offsetCenter = 80) {
        const pulse = 1 + Math.sin(Date.now() * 0.003) * 0.1;
        let x = 16 * Math.pow(Math.sin(p.t), 3) * p.r * pulse;
        let y = -(13 * Math.cos(p.t) - 5 * Math.cos(2*p.t) - 2 * Math.cos(3*p.t) - Math.cos(4*p.t)) * p.r * pulse;
        let z = p.z * pulse;
        
        let x1 = x * Math.cos(rotationY) - z * Math.sin(rotationY);
        let z1 = x * Math.sin(rotationY) + z * Math.cos(rotationY);
        let y2 = y * Math.cos(rotationX) - z1 * Math.sin(rotationX);
        
        const scale = Math.min(width, height) / 45;
        // SUBIMOS EL CORAZÓN UN POCO MÁS DEL CENTRO (-80px)
        return { x: x1 * scale + width / 2, y: y2 * scale + height / 2 - offsetCenter };
    }

    function createTextPoints(text, xCenter) {
        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = width; tCanvas.height = height;
        tCtx.fillStyle = "white";
        tCtx.font = `bold ${Math.min(width/10, 42)}px 'Dancing Script'`;
        tCtx.textAlign = 'center';
        // BAJAMOS EL TEXTO DEL CENTRO (+180px) PARA QUE NO CHOQUE CON EL CORAZÓN
        tCtx.fillText(text, xCenter, height / 2 + 180);
        const data = tCtx.getImageData(0,0,width,height).data;
        const pts = [];
        for(let y=0; y<height; y+=3) for(let x=0; x<width; x+=3) if(data[(y*width+x)*4+3]>128) pts.push({x,y});
        return pts;
    }

    async function startTextSequence() {
        const words = [
            { txt: "¡Feliz", x: width * 0.22 },
            { txt: "Cumpleaños,", x: width * 0.5 },
            { txt: "Vivian!", x: width * 0.78 }
        ];

        for (let word of words) {
            const pts = createTextPoints(word.txt, word.x);
            // El texto nace secuencialmente de las partículas del corazón y se queda ahí
            pts.forEach(pt => {
                textParticles.push({
                    x: width/2, y: height/2 - 80, // Nacen del centro del corazón
                    tx: pt.x, ty: pt.y, 
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 0 // Para la opacidad
                });
            });
            await new Promise(r => setTimeout(r, 700)); // Secuencial
        }
    }

    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0,0,width,height);
        
        if (active) {
            rotationX += (targetRotationX - rotationX) * 0.05;
            rotationY += (targetRotationY - rotationY) * 0.05;

            // DIBUJAR CORAZÓN (Sigue latiendo en 3D)
            heartParticles.forEach(p => {
                const target = getHeartPos(p);
                p.vx += (target.x - p.x) * 0.04;
                p.vy += (target.y - p.y) * 0.04;
                p.vx *= 0.85; p.vy *= 0.85;
                p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = '#ff2d55';
                ctx.fillRect(p.x, p.y, 2, 2);
            });

            // DIBUJAR TEXTO (Nace, forma y se queda fijo para siempre)
            textParticles.forEach(p => {
                p.vx += (p.tx - p.x) * 0.035;
                p.vy += (p.ty - p.y) * 0.035;
                p.vx *= 0.9; p.vy *= 0.9;
                p.x += p.vx; p.y += p.vy;
                
                // Efecto de aparición suave
                ctx.fillStyle = `rgba(255, 45, 85, ${Math.min(p.life += 0.02, 1)})`;
                ctx.fillRect(p.x, p.y, 1.8, 1.8);
            });
        }
        requestAnimationFrame(draw);
    }

    btn.addEventListener('click', () => {
        audio.play(); btn.style.display = 'none';
        active = true;
        setTimeout(startTextSequence, 1500);
    });

    let lastTap = 0;
    window.addEventListener('touchend', (e) => {
        const now = Date.now();
        const touchX = e.changedTouches[0].clientX;
        const touchY = e.changedTouches[0].clientY;
        
        // DOBLE TOQUE MOVIDO A LA ZONA INFERIOR DE LA PANTALLA
        const isPhotoArea = touchY > height * 0.65; // El doble toque en el 35% inferior

        if (now - lastTap < 300 && isPhotoArea) {
            foto.style.transform = "translate(-50%, -50%) scale(1)";
            foto.style.opacity = "1";
            setTimeout(() => { 
                foto.style.transform = "translate(-50%, -50%) scale(0)";
                foto.style.opacity = "0";
            }, 7000);
        }
        lastTap = now;
        isDragging = false;
    });

    window.addEventListener('touchstart', e => {
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        isDragging = true;
    });

    window.addEventListener('touchmove', e => {
        if(isDragging) {
            targetRotationY += (e.touches[0].clientX - lastX) * 0.015;
            targetRotationX -= (e.touches[0].clientY - lastY) * 0.015;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }
    });

    window.addEventListener('resize', init);
    init(); draw();
</script>
</body>
</html>
