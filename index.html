
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vivian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(255, 45, 85, 0.1); border: 1px solid #ff2d55;
            color: #ff2d55; padding: 15px 30px; border-radius: 40px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 12px; letter-spacing: 3px;
        }

        #mensaje-fijo {
            position: absolute; bottom: 8%; width: 100%; text-align: center; z-index: 10;
            font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; opacity: 0.8;
        }

        #foto-vivian {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 55; max-height: 80%; max-width: 80%; border-radius: 15px;
            border: 2px solid #ff2d55; transition: all 0.6s ease; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>
    <button id="btn-play">PARA VIVIAN 🎵</button>
    <div id="mensaje-fijo">TU BELLEZA ILUMINA MÁS QUE CUALQUIER ESTRELLA.<br>(DOBLE TOQUE EN EL CORAZÓN PARA SORPRESA)</div>
    <img id="foto-vivian" src="Foto.jpg" alt="Vivian">
    <canvas id="heartCanvas"></canvas>
    <audio id="musica" loop><source src="bruno.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('musica');
    const btn = document.getElementById('btn-play');
    const foto = document.getElementById('foto-vivian');

    let width, height, particles = [];
    let rotationX = 0, rotationY = 0;
    let targetRotationX = 0, targetRotationY = 0;
    let lastX = 0, lastY = 0, isDragging = false;
    let state = "WAIT"; 

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 2800; i++) {
            const t = Math.random() * Math.PI * 2;
            particles.push({
                t, r: Math.pow(Math.random(), 0.5), z: (Math.random()-0.5)*20,
                x: width/2, y: height/2, vx: 0, vy: 0, tx: 0, ty: 0, active: false
            });
        }
    }

    function getHeartPos(p) {
        const pulse = 1 + Math.sin(Date.now() * 0.003) * 0.08;
        let x = 16 * Math.pow(Math.sin(p.t), 3) * p.r * pulse;
        let y = -(13 * Math.cos(p.t) - 5 * Math.cos(2*p.t) - 2 * Math.cos(3*p.t) - Math.cos(4*p.t)) * p.r * pulse;
        let z = p.z * pulse;
        
        let x1 = x * Math.cos(rotationY) - z * Math.sin(rotationY);
        let z1 = x * Math.sin(rotationY) + z * Math.cos(rotationY);
        let y2 = y * Math.cos(rotationX) - z1 * Math.sin(rotationX);
        
        // Ajuste de escala dinámico según el ancho de pantalla
        const scale = Math.min(width, height) / 45;
        return { x: x1 * scale + width / 2, y: y2 * scale + height / 2 - 40 };
    }

    function createTextPoints(text, xPercent) {
        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = width; tCanvas.height = height;
        tCtx.fillStyle = "white";
        // Fuente responsiva
        const fontSize = Math.min(width/10, 40);
        tCtx.font = `bold ${fontSize}px 'Dancing Script'`;
        tCtx.textAlign = 'center';
        tCtx.fillText(text, width * xPercent, height / 2 + 160);
        const data = tCtx.getImageData(0,0,width,height).data;
        const pts = [];
        for(let y=0; y<height; y+=3) for(let x=0; x<width; x+=3) if(data[(y*width+x)*4+3]>128) pts.push({x,y});
        return pts;
    }

    async function startSequence() {
        state = "TEXT";
        const words = [
            { txt: "¡Feliz", x: 0.2 },
            { txt: "Cumpleaños,", x: 0.5 },
            { txt: "Vivian!", x: 0.8 }
        ];

        let pIdx = 0;
        particles.forEach(p => p.active = false);

        for (let word of words) {
            const pts = createTextPoints(word.txt, word.x);
            for (let i = 0; i < pts.length && pIdx < particles.length; i++) {
                let p = particles[pIdx++];
                p.active = true; p.tx = pts[i].x; p.ty = pts[i].y;
            }
            await new Promise(r => setTimeout(r, 400));
        }

        await new Promise(r => setTimeout(r, 4500)); 
        
        // CRÍTICO: Limpiar coordenadas de texto y forzar regreso
        state = "HEART";
        particles.forEach(p => { p.active = false; });
    }

    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0,0,width,height);
        
        if (state !== "WAIT") {
            rotationX += (targetRotationX - rotationX) * 0.05;
            rotationY += (targetRotationY - rotationY) * 0.05;

            particles.forEach(p => {
                const target = (state === "TEXT" && p.active) ? {x: p.tx, y: p.ty} : getHeartPos(p);
                p.vx += (target.x - p.x) * 0.04;
                p.vy += (target.y - p.y) * 0.04;
                p.vx *= 0.85; p.vy *= 0.85;
                p.x += p.vx; p.y += p.vy;
                
                ctx.fillStyle = '#ff2d55';
                ctx.fillRect(p.x, p.y, 2, 2);
            });
        }
        requestAnimationFrame(draw);
    }

    btn.addEventListener('click', () => {
        audio.play(); btn.style.display = 'none';
        state = "HEART";
        setTimeout(startSequence, 1500);
    });

    let lastTap = 0;
    window.addEventListener('touchend', (e) => {
        const now = Date.now();
        const touchX = e.changedTouches[0].clientX;
        const touchY = e.changedTouches[0].clientY;
        const isHeartArea = Math.abs(touchX - width/2) < 100 && Math.abs(touchY - height/2) < 100;

        if (now - lastTap < 300 && isHeartArea) {
            foto.style.transform = "translate(-50%, -50%) scale(1)";
            foto.style.opacity = "1";
            setTimeout(() => { 
                foto.style.transform = "translate(-50%, -50%) scale(0)";
                foto.style.opacity = "0";
            }, 6000);
        }
        lastTap = now;
    });

    window.addEventListener('touchstart', e => {
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        isDragging = true;
    });

    window.addEventListener('touchmove', e => {
        if(isDragging) {
            targetRotationY += (e.touches[0].clientX - lastX) * 0.01;
            targetRotationX -= (e.touches[0].clientY - lastY) * 0.01;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }
    });

    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('resize', () => { init(); });
    init(); draw();
</script>
</body>
</html>
