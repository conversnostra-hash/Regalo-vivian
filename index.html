
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vivian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #btn-play {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: rgba(0, 0, 0, 0.9); border: 2px solid #ff2d55;
            color: #ff2d55; padding: 15px 30px; border-radius: 50px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 14px; letter-spacing: 4px;
            box-shadow: 0 0 20px #ff2d55;
        }

        #mensaje-fijo {
            position: absolute; bottom: 5%; width: 100%; text-align: center; z-index: 10;
            font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 1px;
            text-transform: uppercase; color: #ffb3c1; pointer-events: auto;
            background: rgba(0,0,0,0.4); padding: 8px 0;
        }

        #foto-vivian {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 50; max-height: 60%; max-width: 80%; border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 45, 85, 0.8); transition: all 0.6s ease;
            opacity: 0; pointer-events: none; border: 3px solid #ff2d55;
        }
    </style>
</head>
<body>
    <button id="btn-play">PARA VIVIAN 🎵</button>
    <div id="mensaje-fijo">Tu belleza ilumina más que cualquier estrella.<br>(Doble toque rápido para sorpresa)</div>
    <img id="foto-vivian" src="Foto.jpg" alt="Vivian">
    <canvas id="heartCanvas"></canvas>
    <audio id="musica" loop><source src="bruno.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('musica');
    const btn = document.getElementById('btn-play');
    const foto = document.getElementById('foto-vivian');
    const msgFijo = document.getElementById('mensaje-fijo');

    let width, height, particles = [];
    let rotationX = 0, rotationY = 0;
    let targetRotationX = 0, targetRotationY = 0;
    let lastX = 0, lastY = 0, isDragging = false;
    let state = "WAIT"; // WAIT, HEART, TEXT

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 2200; i++) {
            const t = Math.random() * Math.PI * 2;
            particles.push({
                t, r: Math.pow(Math.random(), 0.5), z: (Math.random()-0.5)*25,
                x: width/2, y: height/2, vx: 0, vy: 0, tx: 0, ty: 0, active: false
            });
        }
    }

    function getHeartPos(p) {
        const pulse = 1 + Math.sin(Date.now() * 0.003) * 0.07;
        let x = 16 * Math.pow(Math.sin(p.t), 3) * p.r * pulse;
        let y = -(13 * Math.cos(p.t) - 5 * Math.cos(2*p.t) - 2 * Math.cos(3*p.t) - Math.cos(4*p.t)) * p.r * pulse;
        let z = p.z * pulse;
        
        let x1 = x * Math.cos(rotationY) - z * Math.sin(rotationY);
        let z1 = x * Math.sin(rotationY) + z * Math.cos(rotationY);
        let y2 = y * Math.cos(rotationX) - z1 * Math.sin(rotationX);
        
        return { x: x1 * 11 + width / 2, y: y2 * 11 + height / 2 - 50 };
    }

    function createTextPoints(text, xOffset) {
        const tCanvas = document.createElement('canvas');
        const tCtx = tCanvas.getContext('2d');
        tCanvas.width = width; tCanvas.height = height;
        tCtx.fillStyle = "white";
        tCtx.font = `bold ${Math.min(width/12, 30)}px 'Dancing Script'`;
        tCtx.textAlign = 'center';
        // Ubicación debajo del corazón (height/2 + 120)
        tCtx.fillText(text, width * xOffset, height / 2 + 130);
        const data = tCtx.getImageData(0,0,width,height).data;
        const pts = [];
        for(let y=0; y<height; y+=4) for(let x=0; x<width; x+=4) if(data[(y*width+x)*4+3]>128) pts.push({x,y});
        return pts;
    }

    async function startSequence() {
        state = "TEXT";
        // Definimos las palabras y sus posiciones horizontales (0.2, 0.5, 0.8 del ancho)
        const words = [
            { txt: "¡Feliz", x: 0.25 },
            { txt: "Cumpleaños,", x: 0.5 },
            { txt: "Vivian!", x: 0.75 }
        ];

        let currentParticleIdx = 0;
        for (let word of words) {
            const pts = createTextPoints(word.txt, word.x);
            for (let i = 0; i < pts.length && currentParticleIdx < particles.length; i++) {
                let p = particles[currentParticleIdx++];
                p.active = true;
                p.tx = pts[i].x;
                p.ty = pts[i].y;
            }
            await new Promise(r => setTimeout(r, 600)); // Aparecen progresivamente
        }
        
        await new Promise(r => setTimeout(r, 3000)); // Quedan visibles un tiempo
        state = "HEART"; // Regresan al corazón
    }

    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0,0,width,height);
        
        if (state !== "WAIT") {
            rotationX += (targetRotationX - rotationX) * 0.05;
            rotationY += (targetRotationY - rotationY) * 0.05;

            particles.forEach(p => {
                const target = (state === "TEXT" && p.active) ? {x: p.tx, y: p.ty} : getHeartPos(p);
                p.vx += (target.x - p.x) * 0.04;
                p.vy += (target.y - p.y) * 0.04;
                p.vx *= 0.85; p.vy *= 0.85;
                p.x += p.vx; p.y += p.vy;
                
                ctx.fillStyle = '#ff2d55';
                ctx.fillRect(p.x, p.y, 2, 2);
            });
        }
        requestAnimationFrame(draw);
    }

    btn.addEventListener('click', () => {
        audio.play();
        btn.style.display = 'none';
        state = "HEART";
        setTimeout(startSequence, 1000);
    });

    let lastTap = 0;
    msgFijo.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
            foto.style.transform = "translate(-50%, -50%) scale(1)";
            foto.style.opacity = "1";
            setTimeout(() => { 
                foto.style.transform = "translate(-50%, -50%) scale(0)";
                foto.style.opacity = "0";
            }, 5000);
        }
        lastTap = now;
    });

    window.addEventListener('touchstart', e => {
        if (e.target === msgFijo) return;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        isDragging = true;
    });

    window.addEventListener('touchmove', e => {
        if(isDragging) {
            targetRotationY += (e.touches[0].clientX - lastX) * 0.01;
            targetRotationX -= (e.touches[0].clientY - lastY) * 0.01;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        }
    });

    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('resize', init);

    init(); draw();
</script>
</body>
</html>
